<script>
const DATA={"36": {"title": "Ch 36 · Loss, Grief & End of Life", "emoji": "🕊️", "concepts": [{"id": "36a", "icon": "🔀", "title": "Types of Loss", "teachback": "Define actual vs perceived vs anticipatory loss — and give one example of each.", "compare": [{"name": "Actual", "color": "cobalt", "points": ["A loss others can recognize/verify", "Death, amputation, loss of a job"]}, {"name": "Perceived", "color": "purple", "points": ["Felt by the person but not obvious to others", "Loss of confidence, independence, role"]}, {"name": "Anticipatory", "color": "rose", "points": ["Grieving BEFORE the loss occurs", "Family of a terminal patient grieving early"]}], "key": "Loss can be real or felt — and grief can start before the loss itself.", "priority": "Assess what the loss MEANS to this patient before planning care.", "interventions": ["Use open-ended questions and presence", "Validate feelings without judgment", "Identify support systems"], "quiz": {"q": "A 40-year-old whose mother has advanced dementia says, “I've already lost the woman who raised me, even though she's still here.” This is BEST described as:", "opts": ["Anticipatory grief", "Disenfranchised grief", "Complicated grief", "Maturational loss"], "correct": [0], "sata": false, "rat": "Anticipatory grief is mourning that begins before the actual loss — common with dementia and terminal illness. It is openly felt (not disenfranchised), not yet prolonged/disabling (not complicated), and not a developmental milestone."}}, {"id": "36b", "icon": "🪜", "title": "Kübler-Ross 5 Stages vs Worden's 4 Tasks", "teachback": "Contrast Kübler-Ross STAGES with Worden's TASKS. Why does the difference matter for nursing?", "compare": [{"name": "Kübler-Ross (stages/feelings)", "color": "cobalt", "points": ["Denial → Anger → Bargaining → Depression → Acceptance", "NOT linear — people move back and forth", "Passive emotional experience"]}, {"name": "Worden (tasks/active work)", "color": "teal", "points": ["I: Accept the reality of the loss", "II: Process the pain of grief", "III: Adjust to a world without the deceased", "IV: Find an enduring connection while moving forward"]}], "key": "Stages = what they feel; Tasks = active work the griever does.", "priority": "Meet the patient in their current stage — never force them toward acceptance.", "interventions": ["Allow expression of denial/anger without arguing", "Support each task as it appears", "Refer for counseling if they get stuck"], "quiz": {"q": "Which statements about grief theories are accurate? Select all that apply.", "opts": ["Kübler-Ross stages are not necessarily experienced in order", "Worden's tasks describe active work the griever does", "A person must reach ‘acceptance’ for grief to be healthy", "Worden's Task I is accepting the reality of the loss", "Bargaining is one of Worden's four tasks"], "correct": [0, 1, 3], "sata": true, "rat": "Kübler-Ross stages are non-sequential; Worden frames grief as active tasks, the first being to accept the reality of the loss. Acceptance is not required for healthy grieving, and bargaining is a Kübler-Ross stage, not a Worden task."}, "quizzes": [{"q": "Which statements about grief theories are accurate? Select all that apply.", "opts": ["Kübler-Ross stages are not necessarily experienced in order", "Worden's tasks describe active work the griever does", "A person must reach ‘acceptance’ for grief to be healthy", "Worden's Task I is accepting the reality of the loss", "Bargaining is one of Worden's four tasks"], "correct": [0, 1, 3], "sata": true, "rat": "Kübler-Ross stages are non-sequential; Worden frames grief as active tasks, the first being to accept the reality of the loss. Acceptance is not required for healthy grieving, and bargaining is a Kübler-Ross stage, not a Worden task."}, {"q": "A newly diagnosed patient snaps, “You don't know anything — get me a real doctor who'll tell me the truth.” Using Kübler-Ross, the nurse identifies this stage and responds BEST by:", "opts": ["Recognizing anger and remaining nondefensive while allowing the patient to vent", "Recognizing denial and repeating the diagnosis until it is accepted", "Recognizing bargaining and offering to renegotiate the treatment plan", "Recognizing depression and requesting an antidepressant order"], "correct": [0], "sata": false, "rat": "Hostility and lashing out reflect the anger stage. The nurse stays nondefensive and allows expression; arguing, repeating the diagnosis, or medicating are non-therapeutic and misread the stage."}]}, {"id": "36c", "icon": "⚠️", "title": "Normal vs Complicated vs Disenfranchised Grief", "teachback": "How do you tell normal grief from complicated grief? What makes grief 'disenfranchised'?", "compare": [{"name": "Normal", "color": "teal", "points": ["Waves of sadness, somatic aches", "Transient sleep/appetite changes", "Gradual re-engagement in life"]}, {"name": "Complicated", "color": "rose", "points": ["Disabling, prolonged (>12 mo)", "Persistent yearning, can't function", "Suicidal wish to 'join' the deceased"]}, {"name": "Disenfranchised", "color": "purple", "points": ["Loss not socially acknowledged/validated", "Unrecognized partner, pet, pregnancy loss", "Griever feels they have no 'right' to grieve"]}], "key": "Complicated = stuck and disabling; disenfranchised = unvalidated by others.", "priority": "Screen for complicated grief risk (sudden/violent death, high dependency, poor support) and refer.", "interventions": ["Acknowledge and legitimize the loss", "Connect to support resources", "Refer for grief therapy when prolonged/disabling"], "quiz": {"q": "Which patient is at HIGHEST risk for complicated grief?", "opts": ["A man whose wife died suddenly in a crash and on whom he depended for everything", "A widow with a large, supportive faith community", "A daughter who anticipated her father's death over two years", "A man whose expected death of a parent occurred after a long illness"], "correct": [0], "sata": false, "rat": "Sudden, traumatic death comfort-only focus describe hospice, which is one form of palliative care, not the whole."}, {"q": "Which patient is MOST appropriate for a hospice (not just palliative) referral?", "opts": ["A patient with end-stage heart failure, prognosis under 6 months, who has chosen to stop aggressive treatment", "A newly diagnosed cancer patient starting curative chemotherapy", "A patient seeking better pain control while still pursuing a cure", "A post-op patient who needs short-term rehabilitation"], "correct": [0], "sata": false, "rat": "Hospice requires a terminal prognosis (~6 months) and a shift to comfort over cure. The others are candidates for palliative care alongside ongoing treatment, which is not the same as hospice."}]}, {"id": "36e", "icon": "🌙", "title": "Signs of Imminent Death + Comfort Priorities", "teachback": "List the signs that death is near. What's the nurse's priority for 'death rattle' and air hunger?", "compare": [{"name": "Signs of imminent death", "color": "purple", "points": ["Decreased LOC, mottled/cool extremities", "Cheyne-Stokes / mandibular (jaw) breathing", "Death rattle (pooled secretions)", "Decreased, dark urine output"]}], "key": "At end of life the body slows — the goal shifts entirely to comfort.", "priority": "COMFORT first: reposition, oral care, low-dose opioids for dyspnea/air hunger; reassure family.", "interventions": ["Side-lying + oral care for secretions (NOT deep suction)", "Cool fan, elevate HOB for air hunger", "Continue opioids — double effect is ethical when intent is comfort"], "quiz": {"q": "A dying patient has loud, wet respirations and the family is distressed. What is the nurse's PRIORITY action?", "opts": ["Reposition to side-lying and provide gentle oral care", "Perform deep nasotracheal suctioning every hour", "Increase the IV fluid rate to thin secretions", "Sit the patient fully upright and coach coughing"], "correct": [0], "sata": false, "rat": "Repositioning and oral care (with an anticholinergic if ordered) manage terminal secretions comfortably. Deep suction is distressing, more fluid worsens secretions, and forced coughing is beyond the dying patient's strength."}, "quizzes": [{"q": "A dying patient has loud, wet respirations and the family is distressed. What is the nurse's PRIORITY action?", "opts": ["Reposition to side-lying and provide gentle oral care", "Perform deep nasotracheal suctioning every hour", "Increase the IV fluid rate to thin secretions", "Sit the patient fully upright and coach coughing"], "correct": [0], "sata": false, "rat": "Repositioning and oral care (with an anticholinergic if ordered) manage terminal secretions comfortably. Deep suction is distressing, more fluid worsens secretions, and forced coughing is beyond the dying patient's strength."}, {"q": "Which findings indicate that death is imminent (hours to days)? Select all that apply.", "opts": ["Cheyne-Stokes respirations", "Cool, mottled extremities", "Decreased level of consciousness", "Increased urine output", "Bounding peripheral pulses"], "correct": [0, 1, 2], "sata": true, "rat": "Imminent death brings Cheyne-Stokes breathing, cool mottled skin, and declining consciousness. Urine output decreases (not increases) and pulses weaken (not bound)."}]}, {"id": "36f", "icon": "⚰️", "title": "Postmortem Care & Legal Points", "teachback": "When is an autopsy legally required? What are the key postmortem and cultural considerations?", "compare": [{"name": "Autopsy often required", "color": "rose", "points": ["Violent, suspicious, or unexpected death", "Death within 24 hrs of admission", "Suicide or homicide"]}, {"name": "Postmortem care", "color": "cobalt", "points": ["Provide BEFORE rigor mortis sets in", "ID tags on toe/ankle AND outside shroud", "Tag body if communicable disease"]}], "key": "Postmortem care is timely, respectful, and culturally guided.", "priority": "Honor cultural/religious rituals (e.g., same-gender family washing in Islam/Judaism); delay routine care if requested.", "interventions": ["Ask family about rituals and accommodate", "Allow family participation", "Maintain dignity and privacy"], "quiz": {"q": "Which deaths typically require an autopsy? Select all that apply.", "opts": ["Death within 24 hours of hospital admission", "Homicide or suspected violent death", "Death of unknown or suspicious cause", "An expected hospice death at home after a long illness", "A documented terminal illness with an expected course"], "correct": [0, 1, 2], "sata": true, "rat": "Autopsies are generally required for deaths within 24 hours of admission, violent/homicidal deaths, and unknown or suspicious causes. Expected deaths from documented terminal illness usually do not require one."}}, {"id": "36g", "icon": "💬", "title": "Therapeutic Communication at End of Life", "teachback": "What makes a response therapeutic vs non-therapeutic with a grieving family?", "compare": [{"name": "Therapeutic", "color": "teal", "points": ["Use silence and presence", "Reflect feelings ('It sounds like...')", "Open-ended; acknowledge the loss"]}, {"name": "Non-therapeutic", "color": "rose", "points": ["False reassurance ('Everything will be fine')", "Clichés ('Everything happens for a reason')", "Changing the subject or minimizing"]}], "key": "Presence and reflection beat reassurance and clichés.", "priority": "Acknowledge feelings; avoid false reassurance that shuts down expression.", "interventions": ["Sit and allow silence", "Reflect and validate emotions", "Avoid 'at least' and 'everything happens for a reason'"], "quiz": {"correct": [0], "sata": false, "q": "A grieving spouse says, 'I should have brought him in sooner — this is my fault.' The MOST therapeutic response is:", "opts": ["'It sounds like you're feeling responsible for what happened.'", "'It's not your fault, so try not to think that way.'", "'Everything happens for a reason.'", "'The doctors did everything they could.'"], "rat": "Reflecting the feeling keeps the focus on the patient and invites expression. 'It's not your fault' is false reassurance, the cliché dismisses feelings, and shifting to the doctors changes the subject."}}, {"id": "36g", "icon": "💬", "title": "Therapeutic vs Non-Therapeutic Communication", "teachback": "Pick the best response to a grieving family member.", "compare": [{"name": "Therapeutic", "color": "teal", "points": ["Use silence and presence", "Reflect feelings (“You sound overwhelmed”)", "Open-ended, patient-led"]}, {"name": "Non-therapeutic", "color": "rose", "points": ["False reassurance (“Everything happens for a reason”)", "“Why” questions that sound accusatory", "Changing the subject / minimizing"]}], "key": "Presence beats fixing — reflect feelings, never offer false reassurance.", "priority": "Acknowledge emotion and stay; avoid clichés and false comfort.", "interventions": ["Active listening and silence", "Reflect and validate feelings", "Avoid ‘at least’ and ‘everything happens for a reason’"], "quiz": {"q": "A grieving spouse says, “I should have brought him in sooner — this is my fault.” Which response is MOST therapeutic?", "opts": ["“It sounds like you're feeling responsible for what happened.”", "“It's not your fault, so don't think that way.”", "“Why didn't you bring him in sooner?”", "“The doctors did everything they could.”"], "correct": [0], "sata": false, "rat": "Reflecting the feeling keeps the focus on the patient and invites expression. The others are false reassurance, accusatory, or dismissive."}}, {"id": "36h", "icon": "📋", "title": "DNR / Comfort Care / Brain Death", "teachback": "Explain what each order or status does and does not mean.", "compare": [{"name": "DNR / DNI", "color": "cobalt", "points": ["No CPR / no intubation", "All other care continues"]}, {"name": "Comfort Care (DNR-CC)", "color": "purple", "points": ["Comfort measures only", "No resuscitation or aggressive treatment"]}, {"name": "Brain Death", "color": "rose", "points": ["Legally and clinically DEAD", "Ventilator maintains circulation", "No chance of recovery"]}], "key": "Brain death is death — the ventilator only maintains circulation.", "priority": "Honor documented wishes; clarify conflicts with provider/ethics before acting.", "interventions": ["Verify and follow the order on the chart", "Support the family's understanding", "Brain death may allow organ donation"], "quiz": {"q": "The family of a patient declared brain dead asks when the patient will “wake up.” The nurse's BEST response is:", "opts": ["“Brain death is legally death; the ventilator maintains circulation, and recovery is not possible.”", "“There is still a chance if we keep waiting.”", "“The patient is in a deep coma and may improve.”", "“Once the swelling goes down, function usually returns.”"], "correct": [0], "sata": false, "rat": "Brain death is the legal definition of death; the ventilator can maintain circulation (allowing possible organ donation) but there is no recovery. It is not a coma or reversible."}}]}, "37": {"title": "Ch 37 · Stress & Coping", "emoji": "🧠", "concepts": [{"id": "37a", "icon": "📈", "title": "GAS — 3 Stages", "teachback": "Walk through the 3 stages of the General Adaptation Syndrome. What distinguishes resistance from exhaustion?", "compare": [{"name": "Alarm", "color": "rose", "points": ["Fight-or-flight; ↑ epinephrine/cortisol", "↑ HR, ↑ BP, dilated pupils"]}, {"name": "Resistance", "color": "teal", "points": ["Body adapts and stabilizes", "Values trend back toward baseline"]}, {"name": "Exhaustion", "color": "purple", "points": ["Reserves depleted; organ/tissue breakdown", "Alarm symptoms return; illness susceptibility"]}], "key": "Resistance = adapting; exhaustion = the body can no longer keep up.", "priority": "Identify the stressor and the patient's stage to target intervention.", "interventions": ["Reduce/remove stressors where possible", "Promote rest, nutrition, support", "Teach coping before exhaustion sets in"], "quiz": {"q": "A patient under months of unrelenting stress now has frequent infections, exhaustion, and a return of their original symptoms with no new stressor. Which GAS stage is this?", "opts": ["Exhaustion", "Alarm", "Resistance", "Adaptation"], "correct": [0], "sata": false, "rat": "Depleted reserves, illness susceptibility, and the return of alarm-stage symptoms mark the exhaustion stage. Resistance is the adaptive phase where values trend back toward baseline."}}, {"id": "37b", "icon": "🆘", "title": "Crisis Types", "teachback": "Differentiate maturational, situational, and adventitious crises with an example of each.", "compare": [{"name": "Maturational", "color": "cobalt", "points": ["Predictable developmental milestone", "Marriage, retirement, new baby"]}, {"name": "Situational", "color": "rose", "points": ["Unexpected external event", "Job loss, divorce, illness"]}, {"name": "Adventitious", "color": "purple", "points": ["Disaster / mass trauma", "Hurricane, shooting, pandemic"]}], "key": "Maturational = expected life transition; adventitious = disaster.", "priority": "SAFETY first, then assess perception of the event → situational supports → coping.", "interventions": ["Ensure immediate safety", "Assess the patient's perception of the event", "Mobilize supports and coping skills"], "quiz": {"q": "Which event is an example of a MATURATIONAL crisis?", "opts": ["Retiring after a 40-year career", "Losing a home in a wildfire", "Being assaulted during a robbery", "Surviving a multi-car collision"], "correct": [0], "sata": false, "rat": "Maturational crises arise from predictable developmental transitions such as retirement. The others are adventitious/situational events."}, "quizzes": [{"q": "Which event is an example of a MATURATIONAL crisis?", "opts": ["Retiring after a 40-year career", "Losing a home in a wildfire", "Being assaulted during a robbery", "Surviving a multi-car collision"], "correct": [0], "sata": false, "rat": "Maturational crises arise from predictable developmental transitions such as retirement. The others are adventitious/situational events."}, {"q": "A nurse must identify which scenario is a SITUATIONAL crisis. Which one is it?", "opts": ["A 50-year-old abruptly laid off after 25 years at one company", "A teenager struggling with identity and independence", "A new retiree adjusting to the loss of a work role", "A couple adjusting to the birth of their first child"], "correct": [0], "sata": false, "rat": "A sudden, unexpected external event (job loss) is a situational crisis. Adolescent identity, retirement, and new parenthood are predictable developmental (maturational) transitions."}]}, {"id": "37c", "icon": "🌡️", "title": "Anxiety Levels", "teachback": "At which anxiety level can a patient still learn? What's the priority intervention at panic level?", "compare": [{"name": "Mild", "color": "teal", "points": ["Alert; learning is enhanced"]}, {"name": "Moderate", "color": "cobalt", "points": ["Narrowed focus; can still learn with help"]}, {"name": "Severe", "color": "amber", "points": ["Scattered; cannot focus or learn"]}, {"name": "Panic", "color": "rose", "points": ["Disorganized; loss of control"]}], "key": "Teaching works at mild–moderate; at severe/panic the patient cannot learn.", "priority": "At panic: STAY with the patient, calm simple directive voice, ensure safety — no teaching.", "interventions": ["Stay, speak calmly and simply", "Reduce stimulation", "Defer education until anxiety drops"], "quiz": {"q": "A patient in panic-level anxiety is hyperventilating and cannot follow directions. What is the PRIORITY nursing action?", "opts": ["Stay with the patient and give calm, simple directions", "Teach structured deep-breathing techniques", "Provide detailed discharge education", "Leave to obtain an anti-anxiety medication"], "correct": [0], "sata": false, "rat": "At panic level the patient cannot learn or process information, so presence, calm simple direction, and safety come first. Teaching is effective only at mild-to-moderate anxiety, and the patient should not be left alone."}, "quizzes": [{"q": "A patient in panic-level anxiety is hyperventilating and cannot follow directions. What is the PRIORITY nursing action?", "opts": ["Stay with the patient and give calm, simple directions", "Teach structured deep-breathing techniques", "Provide detailed discharge education", "Leave to obtain an anti-anxiety medication"], "correct": [0], "sata": false, "rat": "At panic level the patient cannot learn or process information, so presence, calm simple direction, and safety come first. Teaching is effective only at mild-to-moderate anxiety, and the patient should not be left alone."}, {"q": "A patient is pacing, speaking rapidly, and can focus on only one small detail at a time. This is which anxiety level, and what is the appropriate action?", "opts": ["Severe anxiety; use short, simple statements and reduce stimuli", "Mild anxiety; provide detailed teaching to use the energy", "Moderate anxiety; start structured problem-solving", "Panic; apply physical restraints for safety"], "correct": [0], "sata": false, "rat": "A perceptual field narrowed to one detail with pacing is severe anxiety; the nurse uses brief, simple communication and lowers stimulation. Teaching/problem-solving need lower anxiety, and restraint is not indicated."}]}, {"id": "37d", "icon": "🛡️", "title": "Ego Defense Mechanisms", "teachback": "Match the mechanism: blaming staffing for your own error; a child wetting the bed when stressed; calling one nurse 'all good' and another 'all bad.'", "compare": [{"name": "Common mechanisms", "color": "cobalt", "points": ["Denial — refusing to accept reality", "Projection — attributing own feelings to others", "Displacement — redirecting emotion to a safer target", "Rationalization — logical excuses to justify"]}, {"name": "More mechanisms", "color": "purple", "points": ["Regression — reverting to earlier behavior", "Reaction formation — acting opposite to feelings", "Sublimation — channeling into acceptable outlets", "Splitting — all-good vs all-bad (borderline)"]}], "key": "Defense mechanisms are unconscious ways to reduce anxiety.", "priority": "Recognize the pattern; avoid confronting defenses directly during high stress.", "interventions": ["Build trust before challenging distortions", "Teach healthier coping", "Set consistent limits for splitting"], "quiz": {"q": "A nurse who made an error tells colleagues, “It's really the short-staffing — anyone would have done the same.” Which defense mechanism is this?", "opts": ["Rationalization", "Projection", "Displacement", "Reaction formation"], "correct": [0], "sata": false, "rat": "Rationalization justifies a failure with seemingly logical excuses. Projection attributes one's own feelings to others; displacement redirects emotion onto a safer target."}, "quizzes": [{"q": "A nurse who made an error tells colleagues, “It's really the short-staffing — anyone would have done the same.” Which defense mechanism is this?", "opts": ["Rationalization", "Projection", "Displacement", "Reaction formation"], "correct": [0], "sata": false, "rat": "Rationalization justifies a failure with seemingly logical excuses. Projection attributes one's own feelings to others; displacement redirects emotion onto a safer target."}, {"q": "A patient tells a nurse, “You're the only one who cares — everyone else here is cruel and incompetent.” Which nursing actions best manage this splitting? Select all that apply.", "opts": ["Maintain consistent limits across all staff", "Communicate as a team so the patient cannot divide staff", "Avoid taking the praise or criticism personally", "Agree that some staff are better, to build rapport", "Rotate a different nurse each shift to keep it fresh"], "correct": [0, 1, 2], "sata": true, "rat": "Splitting is managed with consistent limits, team communication, and not personalizing the praise/blame. Agreeing with the split or rotating staff unpredictably reinforces the behavior."}]}, {"id": "37e", "icon": "🔥", "title": "Burnout vs Secondary Traumatic Stress vs Second Victim", "teachback": "Three nurses: one is cynical and exhausted with no trigger; one has nightmares after a patient's trauma; one is devastated after their own med error. Name each.", "compare": [{"name": "Burnout", "color": "amber", "points": ["Chronic exhaustion + cynicism", "No single traumatic trigger"]}, {"name": "Secondary Traumatic Stress", "color": "purple", "points": ["PTSD-like from others' trauma", "Intrusive thoughts, avoidance"]}, {"name": "Second Victim", "color": "rose", "points": ["Trauma after an adverse event/error", "Guilt, self-doubt"]}], "key": "Burnout = slow erosion; STS/second victim = trauma-driven.", "priority": "Support, don't punish — peer support and critical-incident debriefing.", "interventions": ["Self-care and boundaries", "Mindfulness; identify locus of control", "Peer/debrief support after events"], "quiz": {"q": "A nurse has intrusive nightmares and now avoids similar patients after a child's traumatic death. This is BEST described as:", "opts": ["Secondary traumatic stress", "Burnout", "Compassion satisfaction", "Moral distress"], "correct": [0], "sata": false, "rat": "Secondary traumatic stress produces PTSD-like intrusion and avoidance from exposure to others' trauma. Burnout is chronic exhaustion and cynicism without a single traumatic trigger."}}, {"id": "37f", "icon": "🧘", "title": "Stress-Management Techniques", "teachback": "Differentiate cognitive restructuring, guided imagery, and progressive muscle relaxation.", "compare": [{"name": "Cognitive", "color": "cobalt", "points": ["Cognitive restructuring: replace negative automatic thoughts", "Reframe distortions into balanced thinking"]}, {"name": "Body / relaxation", "color": "teal", "points": ["Guided imagery: calming mental scenes", "Progressive muscle relaxation: tense then release", "Mindfulness & biofeedback"]}], "key": "Match the technique to the patient's need and ability.", "priority": "Teach coping only when anxiety is mild-to-moderate, not at panic level.", "interventions": ["Practice the technique with the patient", "Pair with slow breathing", "Reinforce regular daily use"], "quiz": {"correct": [0], "sata": false, "q": "A nurse teaches a patient to identify negative automatic thoughts and deliberately replace them with balanced ones. This technique is:", "opts": ["Cognitive restructuring", "Guided imagery", "Progressive muscle relaxation", "Biofeedback"], "rat": "Cognitive restructuring identifies and replaces distorted thoughts. Guided imagery uses calming visualization, progressive relaxation targets muscle tension, and biofeedback uses physiologic signals."}}, {"id": "37f", "icon": "🧰", "title": "Adaptive vs Maladaptive Coping", "teachback": "Identify which coping strategies are healthy.", "compare": [{"name": "Adaptive", "color": "teal", "points": ["Exercise and relaxation", "Seeking social support", "Problem-solving", "Mindfulness / restructuring negative thoughts"]}, {"name": "Maladaptive", "color": "rose", "points": ["Alcohol or substance use", "Avoidance and isolation", "Denial of the problem"]}], "key": "Healthy coping engages the problem or emotion; maladaptive coping numbs or avoids.", "priority": "Reinforce adaptive strategies; identify what is within the patient's control.", "interventions": ["Teach problem- and emotion-focused coping", "Encourage support and outlets", "Screen for substance use as escape"], "quiz": {"q": "Which are healthy, adaptive coping strategies? Select all that apply.", "opts": ["Regular physical exercise", "Seeking social support", "Active problem-solving", "Mindfulness and relaxation", "Using alcohol to unwind after shifts"], "correct": [0, 1, 2, 3], "sata": true, "rat": "Exercise, support-seeking, problem-solving, and mindfulness are adaptive. Using alcohol to cope is maladaptive."}}, {"id": "37g", "icon": "🛡️", "title": "Caplan's Levels of Prevention", "teachback": "Sort an intervention into primary, secondary, or tertiary prevention.", "compare": [{"name": "Primary", "color": "teal", "points": ["Prevent the problem BEFORE it starts", "Stress-management classes, health teaching", "Immunizations"]}, {"name": "Secondary", "color": "amber", "points": ["EARLY detection & prompt treatment", "Screening, crisis intervention"]}, {"name": "Tertiary", "color": "purple", "points": ["Reduce long-term effects / rehab", "Support groups, relapse prevention"]}], "key": "Primary = prevent; Secondary = detect & treat early; Tertiary = rehabilitate.", "priority": "Match the intervention to its level of prevention.", "interventions": ["Primary: education and risk reduction", "Secondary: screen and intervene early", "Tertiary: rehab and ongoing support"], "quiz": {"q": "A nurse leads a stress-management class for healthy new employees to prevent burnout before it develops. This is which level of prevention?", "opts": ["Primary", "Secondary", "Tertiary", "Quaternary"], "correct": [0], "sata": false, "rat": "Preventing a problem before it occurs is primary prevention. Secondary prevention is early screening/treatment of an existing problem; tertiary prevention is rehabilitation to limit long-term effects."}}]}, "42": {"title": "Ch 42 · Fluids, Electrolytes & ABGs", "emoji": "💧", "concepts": [{"id": "42a", "icon": "⚖️", "title": "Fluid Volume Deficit vs Excess", "teachback": "Contrast the vital signs, neck veins, and labs of fluid deficit vs excess. What's the priority for each?", "compare": [{"name": "Deficit (ECV ↓)", "color": "amber", "points": ["↓ BP, ↑ HR, flat neck veins", "Poor turgor, dry mucosa, oliguria", "↑ BUN & hematocrit (hemoconcentration)"]}, {"name": "Excess (ECV ↑)", "color": "cobalt", "points": ["↑ BP, bounding pulse, JVD", "Edema, crackles, weight gain", "↓ BUN & hematocrit (dilution)"]}], "key": "Deficit concentrates the blood; excess dilutes it.", "priority": "Deficit → isotonic fluids; Excess → diuretics, restrict Na/fluid, monitor respiratory status.", "interventions": ["Daily weights + strict I&O", "Deficit: replace volume, monitor BP/HR", "Excess: HOB up, assess lungs, limit sodium"], "quiz": {"q": "Which findings indicate fluid volume EXCESS? Select all that apply.", "opts": ["Bounding pulse", "Crackles in the lungs", "Decreased BUN and hematocrit", "Flat neck veins", "Poor skin turgor and dry mucosa"], "correct": [0, 1, 2], "sata": true, "rat": "Excess fluid causes a bounding pulse, crackles, and dilutional drop in BUN/hematocrit. Flat neck veins, poor turgor, and dry mucosa are signs of fluid volume deficit."}, "quizzes": [{"q": "Which findings indicate fluid volume EXCESS? Select all that apply.", "opts": ["Bounding pulse", "Crackles in the lungs", "Decreased BUN and hematocrit", "Flat neck veins", "Poor skin turgor and dry mucosa"], "correct": [0, 1, 2], "sata": true, "rat": "Excess fluid causes a bounding pulse, crackles, and dilutional drop in BUN/hematocrit. Flat neck veins, poor turgor, and dry mucosa are signs of fluid volume deficit."}, {"q": "Which findings would the nurse expect in an older adult with fluid volume DEFICIT? Select all that apply.", "opts": ["Postural (orthostatic) hypotension", "Tachycardia", "Flat neck veins when supine", "Increased BUN-to-creatinine ratio", "Crackles in the lung bases"], "correct": [0, 1, 2, 3], "sata": true, "rat": "Deficit causes orthostatic hypotension, compensatory tachycardia, flat neck veins, and hemoconcentration (rising BUN-to-creatinine). Crackles indicate fluid excess, not deficit."}]}, {"id": "42b", "icon": "🧪", "title": "IV Fluid Tonicity", "teachback": "Where does each tonicity move water? Which fluid is dangerous in cerebral edema, and which treats it?", "compare": [{"name": "Isotonic", "color": "teal", "points": ["NS, LR — stays in vascular space", "Expands ECV for deficit/blood loss"]}, {"name": "Hypotonic", "color": "amber", "points": ["0.45% NS — water shifts INTO cells", "AVOID in ↑ ICP / cerebral edema"]}, {"name": "Hypertonic", "color": "rose", "points": ["3% NS, D10 — pulls water INTO vessels", "Used for severe hyponatremia/↑ICP; watch overload"]}], "key": "Hypotonic swells cells; hypertonic shrinks them.", "priority": "In ↑ ICP/cerebral edema, question hypotonic fluids; give hypertonic slowly with neuro checks.", "interventions": ["Match fluid to the problem", "Monitor for overload with hypertonic", "Frequent neuro checks with 3% saline"], "quiz": {"q": "A patient with increased intracranial pressure has an IV fluid order the nurse should QUESTION. Which one?", "opts": ["0.45% sodium chloride", "0.9% sodium chloride", "Lactated Ringer's", "3% sodium chloride"], "correct": [0], "sata": false, "rat": "Hypotonic 0.45% saline shifts water into cells and worsens cerebral edema/ICP. Isotonic fluids are safe and hypertonic 3% saline is actually used to reduce cerebral edema."}}, {"id": "42c", "icon": "🧂", "title": "Sodium: Hyper vs Hypo", "teachback": "Sodium 118 with seizures — what's the priority and the #1 safety rule on correction speed?", "compare": [{"name": "Hypernatremia (>145)", "color": "rose", "points": ["Thirst, dry membranes", "Restlessness, neuro changes", "Causes: water loss, DI, tube feeds w/o water"]}, {"name": "Hyponatremia (<135)", "color": "cobalt", "points": ["Headache, confusion, seizures", "Causes: SIADH, excess water, diuretics"]}], "key": "Sodium problems are really WATER-balance problems.", "priority": "Correct sodium SLOWLY — ≤8 mEq/L in 24 hrs (high-risk) to prevent osmotic demyelination; severe symptomatic → 3% saline slowly.", "interventions": ["Seizure precautions + neuro checks", "Hypernatremia: restore water gradually", "Never correct sodium rapidly"], "quiz": {"q": "A patient with a serum sodium of 116 mEq/L is started on 3% saline. The nurse's PRIORITY is to:", "opts": ["Monitor for too-rapid correction and perform frequent neuro checks", "Infuse the saline rapidly to correct the level quickly", "Restrict all oral and IV fluids", "Encourage a high-sodium diet"], "correct": [0], "sata": false, "rat": "Sodium must be corrected slowly — no more than about 8 mEq/L in 24 hours in high-risk patients — to prevent osmotic demyelination. Frequent neuro checks detect over-rapid correction."}, "quizzes": [{"q": "A patient with a serum sodium of 116 mEq/L is started on 3% saline. The nurse's PRIORITY is to:", "opts": ["Monitor for too-rapid correction and perform frequent neuro checks", "Infuse the saline rapidly to correct the level quickly", "Restrict all oral and IV fluids", "Encourage a high-sodium diet"], "correct": [0], "sata": false, "rat": "Sodium must be corrected slowly — no more than about 8 mEq/L in 24 hours in high-risk patients — to prevent osmotic demyelination. Frequent neuro checks detect over-rapid correction."}, {"q": "A patient with SIADH has a serum sodium of 120 mEq/L. Which prescribed order should the nurse QUESTION?", "opts": ["Infuse 1,000 mL of 0.45% saline over 2 hours", "Restrict fluids to 800 mL per day", "Initiate seizure precautions", "Monitor neurologic status hourly"], "correct": [0], "sata": false, "rat": "SIADH causes dilutional hyponatremia, so the treatment is fluid restriction. Hypotonic 0.45% saline adds free water and worsens the hyponatremia — that order should be questioned."}]}, {"id": "42d", "icon": "❤️", "title": "Potassium: Hyper vs Hypo (high-yield)", "teachback": "Potassium 6.8 with peaked T waves — what is given FIRST and why? What's the absolute rule about IV potassium?", "compare": [{"name": "Hyperkalemia (>5.0)", "color": "rose", "points": ["Peaked T waves, wide QRS, bradycardia", "Muscle weakness; cardiac arrest risk"]}, {"name": "Hypokalemia (<3.5)", "color": "amber", "points": ["Flat T waves, U waves, weakness", "↓ bowel sounds; digoxin toxicity risk"]}], "key": "Both extremes are lethal to the heart — potassium is a cardiac emergency either way.", "priority": "HyperK WITH ECG changes → IV calcium gluconate FIRST (stabilize myocardium) → then shift (insulin+D50, albuterol) → then remove (Kayexalate, dialysis). NEVER IV push potassium.", "interventions": ["Continuous cardiac monitoring", "HypoK: replace oral/IV (diluted, on a pump) — never push", "Watch digoxin toxicity with low K"], "quiz": {"q": "A patient has a potassium of 7.0 mEq/L with peaked T waves and a widening QRS. Which does the nurse anticipate giving FIRST?", "opts": ["IV calcium gluconate", "Regular insulin with dextrose", "Sodium polystyrene sulfonate", "An oral potassium binder"], "correct": [0], "sata": false, "rat": "With ECG changes, IV calcium gluconate is given first to stabilize the myocardium. Insulin/dextrose and albuterol then shift potassium into cells, and binders or dialysis remove it. Potassium is NEVER given IV push."}, "quizzes": [{"q": "A patient has a potassium of 7.0 mEq/L with peaked T waves and a widening QRS. Which does the nurse anticipate giving FIRST?", "opts": ["IV calcium gluconate", "Regular insulin with dextrose", "Sodium polystyrene sulfonate", "An oral potassium binder"], "correct": [0], "sata": false, "rat": "With ECG changes, IV calcium gluconate is given first to stabilize the myocardium. Insulin/dextrose and albuterol then shift potassium into cells, and binders or dialysis remove it. Potassium is NEVER given IV push."}, {"q": "A patient's potassium is 6.6 mEq/L and the ECG shows NO changes. Which order should the nurse implement FIRST?", "opts": ["Place the patient on continuous cardiac monitoring", "Administer IV calcium gluconate", "Give sodium polystyrene sulfonate", "Recheck the potassium in the morning"], "correct": [0], "sata": false, "rat": "With hyperkalemia and no ECG changes yet, continuous cardiac monitoring comes first to catch dangerous changes while lowering therapy begins. Calcium gluconate is reserved for hyperkalemia WITH ECG changes — a classic distractor here."}]}, {"id": "42e", "icon": "🦴", "title": "Calcium & Magnesium: Hi vs Lo", "teachback": "What are Trousseau's and Chvostek's signs, and which imbalance causes them? Antidote for hypermagnesemia?", "compare": [{"name": "Hypocalcemia / Hypomagnesemia", "color": "cobalt", "points": ["Tetany, +Trousseau/Chvostek, seizures", "Hyperactive DTRs", "Post-thyroidectomy → watch airway (Ca)"]}, {"name": "Hypercalcemia / Hypermagnesemia", "color": "amber", "points": ["Weakness, ↓ DTRs, lethargy", "Bradycardia, hypotension (Mg)", "Stones/constipation (Ca)"]}], "key": "LOW Ca/Mg = irritable (tetany); HIGH Ca/Mg = sedated (weak, ↓DTR).", "priority": "Hypermagnesemia antidote = IV calcium gluconate; hypocalcemia post-thyroidectomy = monitor for airway/laryngospasm.", "interventions": ["Seizure/fall precautions as appropriate", "Cardiac monitoring", "Hold Mg sources in renal patients"], "quiz": {"q": "Which findings are seen in HYPOcalcemia? Select all that apply.", "opts": ["Positive Trousseau's sign", "Positive Chvostek's sign", "Hyperactive deep tendon reflexes", "Constipation and decreased reflexes", "Bone pain with kidney stones"], "correct": [0, 1, 2], "sata": true, "rat": "Low calcium makes nerves irritable: positive Trousseau's and Chvostek's signs and hyperactive reflexes/tetany. Constipation, diminished reflexes, and stones reflect hypercalcemia."}}, {"id": "42f", "icon": "🫁", "title": "ABG Interpretation (ROME)", "teachback": "State ROME. Interpret: pH 7.25, CO₂ 26, HCO₃ 14 — and name the classic cause.", "compare": [{"name": "R-O: Respiratory Opposite", "color": "cobalt", "points": ["pH & CO₂ move in OPPOSITE directions", "↑CO₂ + ↓pH = respiratory acidosis (COPD)", "↓CO₂ + ↑pH = respiratory alkalosis (hyperventilation)"]}, {"name": "M-E: Metabolic Equal", "color": "teal", "points": ["pH & HCO₃ move in the SAME direction", "↓HCO₃ + ↓pH = metabolic acidosis (DKA, diarrhea)", "↑HCO₃ + ↑pH = metabolic alkalosis (vomiting/suction)"]}], "key": "Steps: pH → CO₂ → HCO₃ → compensation.", "priority": "Identify the primary disorder, then treat the cause (e.g., DKA = metabolic acidosis with Kussmaul breathing).", "interventions": ["Uncompensated: pH abnormal, one value normal", "Partial: pH abnormal, both shifted", "Full: pH normal but both abnormal"], "quiz": {"q": "ABG: pH 7.30, PaCO₂ 58, HCO₃ 26. Using ROME, this is:", "opts": ["Uncompensated respiratory acidosis", "Uncompensated metabolic acidosis", "Respiratory alkalosis", "Metabolic alkalosis"], "correct": [0], "sata": false, "rat": "pH 7.30 is acidotic; CO₂ 58 is high and moves opposite the pH (Respiratory Opposite) = respiratory acidosis. HCO₃ is normal, so it is uncompensated — classic for hypoventilation/COPD retention."}, "quizzes": [{"q": "ABG: pH 7.30, PaCO₂ 58, HCO₃ 26. Using ROME, this is:", "opts": ["Uncompensated respiratory acidosis", "Uncompensated metabolic acidosis", "Respiratory alkalosis", "Metabolic alkalosis"], "correct": [0], "sata": false, "rat": "pH 7.30 is acidotic; CO₂ 58 is high and moves opposite the pH (Respiratory Opposite) = respiratory acidosis. HCO₃ is normal, so it is uncompensated — classic for hypoventilation/COPD retention."}, {"q": "ABG: pH 7.48, PaCO₂ 30, HCO₃ 22. Which interpretation and likely cause fit BEST?", "opts": ["Uncompensated respiratory alkalosis; anxiety/hyperventilation", "Metabolic alkalosis; vomiting", "Respiratory acidosis; COPD", "Fully compensated metabolic acidosis; DKA"], "correct": [0], "sata": false, "rat": "pH 7.48 is alkalotic; CO₂ 30 is low and moves opposite the pH (Respiratory Opposite) = respiratory alkalosis; HCO₃ 22 is normal, so it is uncompensated — classic for hyperventilation/anxiety."}]}, {"id": "42g", "icon": "🩸", "title": "Blood Transfusion Reactions", "teachback": "Differentiate acute hemolytic, febrile, allergic, and TACO reactions — and the first action for a serious one.", "compare": [{"name": "Acute hemolytic", "color": "rose", "points": ["Fever, chills, flank/back pain", "Red/dark urine, hypotension", "ABO incompatibility — life-threatening"]}, {"name": "Febrile / Allergic", "color": "amber", "points": ["Febrile: fever, chills (common)", "Allergic: hives, itching; severe = anaphylaxis"]}, {"name": "TACO (overload)", "color": "cobalt", "points": ["Dyspnea, crackles, JVD, hypertension", "Too much volume, too fast"]}], "key": "Different reactions, different fixes — but stop the blood first for serious ones.", "priority": "STOP the transfusion and keep the line open with normal saline (new tubing); then notify and assess.", "interventions": ["Verify patient/blood identity before hanging", "Stay during the first 15 minutes", "Hemolytic/TACO: stop; mild febrile/allergic: pause and treat"], "quiz": {"correct": [0], "sata": false, "q": "Fifteen minutes into a blood transfusion, a patient develops fever, flank pain, and red-tinged urine. The nurse's FIRST action is to:", "opts": ["Stop the transfusion and keep the line open with normal saline", "Slow the transfusion rate and keep monitoring", "Administer an antihistamine and continue", "Notify the provider before doing anything else"], "rat": "These are signs of an acute hemolytic reaction. Stop the blood immediately and keep the IV open with normal saline through new tubing to maintain access and perfusion; notifying the provider is the next step, not the first."}}, {"id": "42h", "icon": "💉", "title": "IV Complications: Infiltration vs Phlebitis", "teachback": "Cool & pale vs red & warm at the IV site — name each and the action.", "compare": [{"name": "Infiltration", "color": "amber", "points": ["Cool, swollen, pale, taut skin", "Sluggish or stopped flow", "Non-vesicant fluid into tissue"]}, {"name": "Phlebitis", "color": "rose", "points": ["Red, warm, tender; palpable cord", "Vein inflammation"]}, {"name": "Extravasation", "color": "purple", "points": ["Vesicant leaks → tissue damage", "Pain, blistering, necrosis risk"]}], "key": "Cool & pale = infiltration; red & warm = phlebitis.", "priority": "Stop the infusion and remove the catheter; treat per type.", "interventions": ["Infiltration: elevate, warm/cool per fluid", "Phlebitis: warm compress", "Restart IV in a new site"], "quiz": {"correct": [0], "sata": false, "q": "An IV site is cool, swollen, and pale with a sluggish drip. This indicates ___, and the nurse should ___.", "opts": ["infiltration; stop the infusion and remove the catheter", "phlebitis; apply a cold pack and continue", "infection; obtain cultures and continue infusing", "air embolism; clamp the tubing and continue"], "rat": "Cool, pale, swollen tissue with poor flow is infiltration (non-vesicant fluid in tissue). Stop and remove the catheter. Phlebitis is red/warm with a palpable cord — a different problem."}}, {"id": "42g", "icon": "🩸", "title": "Blood Transfusion Reactions", "teachback": "Match the reaction to its signs and the first action.", "compare": [{"name": "Acute Hemolytic", "color": "rose", "points": ["Fever, chills, flank/back pain, dark urine", "Within first 15 min — most dangerous"]}, {"name": "Febrile / Allergic", "color": "amber", "points": ["Febrile: fever/chills (common)", "Allergic: hives/itching → antihistamine; anaphylaxis → epinephrine"]}, {"name": "TACO (overload)", "color": "cobalt", "points": ["Dyspnea, crackles, JVD, hypertension", "Slow/stop, sit upright, diuretic"]}], "key": "ANY reaction → STOP the transfusion first and keep the line open with normal saline.", "priority": "Stop the transfusion, run NS through new tubing, stay with the patient, then notify.", "interventions": ["Verify with two nurses before starting", "Stay during the first 15 minutes", "Stop + NS at the first sign of reaction"], "quiz": {"q": "Fifteen minutes into a transfusion a patient has fever, chills, flank pain, and dark urine. What is the nurse's FIRST action?", "opts": ["Stop the transfusion and keep the line open with normal saline", "Slow the rate and continue monitoring", "Give an antihistamine and resume", "Notify the provider before doing anything else"], "correct": [0], "sata": false, "rat": "These signal an acute hemolytic reaction. Stop the transfusion immediately and maintain the line with normal saline through new tubing; slowing it or giving an antihistamine is unsafe, and notifying is the next step, not the first."}}, {"id": "42h", "icon": "💉", "title": "IV Complications: Infiltration vs Phlebitis vs Extravasation", "teachback": "Tell these three IV-site problems apart and act.", "compare": [{"name": "Infiltration", "color": "cobalt", "points": ["Cool, swollen, pale, taut", "Sluggish flow (non-vesicant fluid)"]}, {"name": "Phlebitis", "color": "amber", "points": ["Red, warm, tender", "Cordlike, palpable vein"]}, {"name": "Extravasation", "color": "rose", "points": ["Leak of a VESICANT drug", "Risk of tissue necrosis"]}], "key": "Cool + pale = infiltration; red + warm = phlebitis; vesicant leak = extravasation.", "priority": "Stop the infusion and remove/relocate the IV; treat per protocol.", "interventions": ["Assess the site each shift", "Infiltration/extravasation: stop, elevate, relocate", "Phlebitis: discontinue, warm compress"], "quiz": {"q": "An IV site is cool, pale, and swollen with a sluggish drip. The nurse recognizes this as ___ and should ___.", "opts": ["Infiltration; stop the infusion and relocate the IV", "Phlebitis; apply a cool compress and continue", "A normal finding; document and continue", "Extravasation; flush the line with heparin"], "correct": [0], "sata": false, "rat": "Cool, pale, swollen, slow-flowing site indicates infiltration; the priority is to stop the infusion and restart in a new site. Redness/warmth would suggest phlebitis."}}, {"id": "42i", "icon": "🔢", "title": "IV Flow Rate & Dosage Math", "teachback": "Calculate the rate — pump (mL/hr) vs gravity (gtt/min).", "compare": [{"name": "mL/hr (pump)", "color": "cobalt", "points": ["Total volume ÷ total hours = mL/hr", "Ex: 1,000 mL over 8 h = 125 mL/hr"]}, {"name": "gtt/min (gravity)", "color": "teal", "points": ["(mL/hr × drop factor) ÷ 60 = gtt/min", "Round to a whole drop", "Drop factor is printed on the tubing"]}], "key": "Pump rate is mL/hr; gravity tubing is gtt/min — don't mix them up.", "priority": "Verify the tubing's drop factor before calculating; use a pump for high-alert or critical drips.", "interventions": ["Double-check high-alert infusions with a second nurse", "Recheck the drip rate after repositioning", "Label tubing with the rate and time"], "quiz": {"q": "Order: infuse 1,000 mL of normal saline over 8 hours using tubing with a drop factor of 15 gtt/mL. What is the flow rate in gtt/min?", "opts": ["31 gtt/min", "21 gtt/min", "60 gtt/min", "125 gtt/min"], "correct": [0], "sata": false, "rat": "1,000 mL ÷ 8 h = 125 mL/hr. Then (125 × 15) ÷ 60 = 31.25, rounded to 31 gtt/min. 125 is the pump (mL/hr) rate, a common distractor."}}]}, "46": {"title": "Ch 46 · Urinary Elimination", "emoji": "🚽", "concepts": [{"id": "46a", "icon": "🩸", "title": "AKI: Prerenal vs Intrarenal vs Postrenal", "teachback": "A dehydrated patient drops urine output — which AKI type? Match each type to its fix.", "compare": [{"name": "Prerenal", "color": "amber", "points": ["↓ perfusion (hypovolemia, shock, HF)", "Fix: restore perfusion/volume"]}, {"name": "Intrarenal", "color": "rose", "points": ["Kidney tissue damage (ATN, nephrotoxins, contrast)", "Fix: protect kidney, stop offending agent"]}, {"name": "Postrenal", "color": "cobalt", "points": ["Obstruction below kidney (BPH, stones)", "Fix: relieve the obstruction"]}], "key": "Before, in, or after the kidney — the cause tells you the fix.", "priority": "Identify and reverse the cause early; monitor output and potassium.", "interventions": ["Strict I&O, daily weights", "Watch hyperkalemia (peaked T waves)", "Avoid nephrotoxins/contrast"], "quiz": {"q": "A patient with severe dehydration and a BP of 80/50 has sharply decreasing urine output. Which type of AKI is most likely?", "opts": ["Prerenal", "Intrarenal", "Postrenal", "Chronic"], "correct": [0], "sata": false, "rat": "Prerenal AKI results from decreased perfusion, as with hypovolemia and hypotension. Intrarenal is direct kidney damage; postrenal is obstruction below the kidney."}}, {"id": "46b", "icon": "📏", "title": "Urine Output Terms", "teachback": "Define oliguria, anuria, and polyuria by volume. What's the minimum acceptable hourly output?", "compare": [{"name": "Oliguria", "color": "amber", "points": ["< 400 mL/day", "Reduced output — early warning"]}, {"name": "Anuria", "color": "rose", "points": ["< 100 mL/day (course standard)", "Kidney failure / obstruction"]}, {"name": "Polyuria", "color": "cobalt", "points": ["> 2.5 L/day", "DI, diuretics, hyperglycemia"]}], "key": "Minimum adequate output ≈ 0.5 mL/kg/hr (about 30 mL/hr).", "priority": "Output < 30 mL/hr needs immediate follow-up for perfusion/obstruction.", "interventions": ["Hourly output for at-risk patients", "Investigate low output promptly", "Bladder scan if retention suspected"], "quiz": {"q": "A patient's total 24-hour urine output is 90 mL. How should the nurse document this?", "opts": ["Anuria", "Oliguria", "Polyuria", "Within normal limits"], "correct": [0], "sata": false, "rat": "Anuria is output under about 100 mL/day and signals kidney failure or obstruction. Oliguria is under 400 mL/day; polyuria exceeds 2.5 L/day."}, "quizzes": [{"q": "A patient's total 24-hour urine output is 90 mL. How should the nurse document this?", "opts": ["Anuria", "Oliguria", "Polyuria", "Within normal limits"], "correct": [0], "sata": false, "rat": "Anuria is output under about 100 mL/day and signals kidney failure or obstruction. Oliguria is under 400 mL/day; polyuria exceeds 2.5 L/day."}, {"q": "A postoperative patient has had a urine output of 25 mL/hr for the last 3 hours. What should the nurse do FIRST?", "opts": ["Assess the catheter for patency and the bladder for distention", "Document the output as adequate and continue monitoring", "Increase the IV infusion rate per protocol", "Administer a prescribed diuretic"], "correct": [0], "sata": false, "rat": "Output below 30 mL/hr is concerning, but the nurse first rules out a mechanical cause — a kinked/clogged catheter or distended bladder — before treating for renal hypoperfusion. Documenting it as adequate is unsafe."}]}, {"id": "46c", "icon": "🦠", "title": "UTI vs CAUTI + Prevention", "teachback": "How does a UTI present differently in an older adult? List 4 prevention strategies.", "compare": [{"name": "UTI / CAUTI signs", "color": "rose", "points": ["Dysuria, frequency, urgency", "Cloudy, foul, suprapubic pain", "Older adults: NEW CONFUSION, low-grade fever"]}, {"name": "Prevention", "color": "teal", "points": ["Wipe front to back; void after intercourse", "Fluids 2–3 L/day; cotton underwear", "Remove catheter ASAP; keep closed system, bag below bladder"]}], "key": "In older adults, new confusion may be the only UTI sign.", "priority": "Remove unnecessary catheters early — the #1 CAUTI prevention.", "interventions": ["Perineal hygiene, fluids", "Closed drainage, no dependent loops", "Daily catheter-necessity review"], "quiz": {"q": "Which actions help prevent a catheter-associated UTI? Select all that apply.", "opts": ["Keep the drainage bag below bladder level", "Maintain a closed drainage system", "Remove the catheter as soon as it is no longer needed", "Routinely irrigate the catheter with antibiotic solution", "Open the system daily to verify urine flow"], "correct": [0, 1, 2], "sata": true, "rat": "Keeping the bag below the bladder, maintaining a closed system, and early removal are core CAUTI-prevention steps. Routine antibiotic irrigation and opening the closed system increase infection risk."}, "quizzes": [{"q": "Which actions help prevent a catheter-associated UTI? Select all that apply.", "opts": ["Keep the drainage bag below bladder level", "Maintain a closed drainage system", "Remove the catheter as soon as it is no longer needed", "Routinely irrigate the catheter with antibiotic solution", "Open the system daily to verify urine flow"], "correct": [0, 1, 2], "sata": true, "rat": "Keeping the bag below the bladder, maintaining a closed system, and early removal are core CAUTI-prevention steps. Routine antibiotic irrigation and opening the closed system increase infection risk."}, {"q": "An 82-year-old becomes acutely confused with a low-grade fever and cloudy urine. Which actions are appropriate? Select all that apply.", "opts": ["Obtain a urinalysis and culture", "Assess for other possible sources of infection", "Encourage fluids unless contraindicated", "Apply restraints to manage the confusion", "Begin formal bladder training immediately"], "correct": [0, 1, 2], "sata": true, "rat": "New confusion with fever and cloudy urine suggests a UTI in an older adult — obtain cultures, evaluate other sources, and hydrate. Restraints are not used to manage delirium, and bladder training is not an acute priority."}]}, {"id": "46d", "icon": "🚨", "title": "Autonomic Dysreflexia (EMERGENCY)", "teachback": "SCI at T6 suddenly has BP 190/110 + pounding headache. What is the FIRST action and the most likely cause?", "compare": [{"name": "Signs (SCI ≥ T6)", "color": "rose", "points": ["Sudden SEVERE HTN (systolic >150 or >40 above baseline)", "Pounding headache, bradycardia", "Flushing/sweating ABOVE the lesion, nasal congestion"]}, {"name": "Triggers", "color": "amber", "points": ["Distended bladder / blocked catheter (most common)", "Fecal impaction", "Tight clothing, skin pressure"]}], "key": "A noxious stimulus below the injury triggers a dangerous BP spike.", "priority": "1) SIT UPRIGHT immediately → 2) find & remove trigger (check catheter/bladder, then bowel) → 3) loosen clothing. Medicate if BP stays high.", "interventions": ["Raise HOB to lower BP", "Relieve bladder/bowel cause", "Monitor BP every few minutes — call provider"], "quiz": {"q": "A patient with a T4 spinal cord injury develops a BP of 200/110 and a pounding headache. What is the nurse's FIRST action?", "opts": ["Place the patient in a sitting position", "Administer a prescribed antihypertensive", "Check for a fecal impaction", "Notify the provider"], "correct": [0], "sata": false, "rat": "In autonomic dysreflexia the first action is to sit the patient upright to lower blood pressure, then quickly find and remove the trigger (usually a distended bladder/blocked catheter, then impaction)."}, "quizzes": [{"q": "A patient with a T4 spinal cord injury develops a BP of 200/110 and a pounding headache. What is the nurse's FIRST action?", "opts": ["Place the patient in a sitting position", "Administer a prescribed antihypertensive", "Check for a fecal impaction", "Notify the provider"], "correct": [0], "sata": false, "rat": "In autonomic dysreflexia the first action is to sit the patient upright to lower blood pressure, then quickly find and remove the trigger (usually a distended bladder/blocked catheter, then impaction)."}, {"q": "A patient with a T5 spinal cord injury reports a sudden pounding headache; BP is 196/104 and pulse is 48. After raising the head of the bed, the nurse's NEXT action is to:", "opts": ["Check the catheter for kinks and the bladder for distention", "Give an oral analgesic for the headache", "Lay the patient flat to improve cerebral perfusion", "Recheck the blood pressure in 30 minutes"], "correct": [0], "sata": false, "rat": "This is autonomic dysreflexia. After sitting the patient up, the nurse removes the trigger — most often a distended bladder or blocked catheter, then impaction. Lying flat worsens the hypertension and an analgesic does not treat the cause."}]}, {"id": "46e", "icon": "💦", "title": "Incontinence Types", "teachback": "Match: leaks when coughing; sudden strong urge; constant dribble from a full bladder; can't reach the toilet in time.", "compare": [{"name": "Stress / Urge", "color": "cobalt", "points": ["Stress: leaks with cough/sneeze/lift", "Urge: sudden strong urge (overactive bladder)"]}, {"name": "Overflow / Functional", "color": "purple", "points": ["Overflow: dribbling from retention/full bladder", "Functional: can't reach toilet (mobility/cognition)"]}], "key": "Identify the mechanism — the type drives the intervention.", "priority": "Match treatment to type (Kegels for stress, bladder training for urge, relieve retention for overflow).", "interventions": ["Pelvic floor (Kegel) exercises", "Scheduled/prompted voiding", "Treat retention; ensure toilet access"], "quiz": {"q": "A woman reports urine leakage when she coughs, sneezes, or lifts heavy objects. Which type of incontinence is this?", "opts": ["Stress", "Urge", "Overflow", "Functional"], "correct": [0], "sata": false, "rat": "Stress incontinence is leakage with increased intra-abdominal pressure (coughing, sneezing, lifting). Urge is a sudden strong urge, overflow is dribbling from retention, and functional is an inability to reach the toilet."}}, {"id": "46f", "icon": "💊", "title": "Key Urinary Meds", "teachback": "Which BPH drug causes orthostatic hypotension, and which OAB drug can cause urinary retention?", "compare": [{"name": "For BPH / output", "color": "cobalt", "points": ["Tamsulosin (alpha-blocker) → orthostatic hypotension", "Furosemide (loop diuretic) → hypokalemia"]}, {"name": "For OAB / symptoms", "color": "purple", "points": ["Oxybutynin (anticholinergic) → retention, dry mouth", "Phenazopyridine → harmless orange urine"]}], "key": "Anticholinergics calm the bladder but can cause retention.", "priority": "Teach tamsulosin patients to rise slowly; assess oxybutynin patients for retention.", "interventions": ["Orthostatic precautions", "Bladder scan if retention suspected", "Monitor potassium with loop diuretics"], "quiz": {"q": "A patient with benign prostatic hyperplasia (BPH) should use which OTC medication with caution?", "opts": ["Diphenhydramine", "Acetaminophen", "Calcium carbonate", "Guaifenesin"], "correct": [0], "sata": false, "rat": "Diphenhydramine is anticholinergic and can precipitate acute urinary retention in BPH. The others do not carry that risk."}, "quizzes": [{"q": "A patient with benign prostatic hyperplasia (BPH) should use which OTC medication with caution?", "opts": ["Diphenhydramine", "Acetaminophen", "Calcium carbonate", "Guaifenesin"], "correct": [0], "sata": false, "rat": "Diphenhydramine is anticholinergic and can precipitate acute urinary retention in BPH. The others do not carry that risk."}, {"q": "A patient with BPH is starting tamsulosin. Which statement indicates a NEED FOR FURTHER TEACHING?", "opts": ["“I'll take the first dose standing up so I can stay active.”", "“I'll change positions slowly to avoid getting dizzy.”", "“I'll take it at bedtime as prescribed.”", "“It relaxes the muscles so I can urinate more easily.”"], "correct": [0], "sata": false, "rat": "Tamsulosin causes orthostatic hypotension, so the first dose is taken at bedtime and patients rise slowly — taking it standing risks a fall. The other statements are correct."}]}, {"id": "46g", "icon": "🧫", "title": "Urinary Specimens & Diagnostics", "teachback": "How do clean-catch, sterile catheter, and 24-hour specimens differ? What is a PVR?", "compare": [{"name": "Specimen types", "color": "cobalt", "points": ["Clean-catch midstream: front-to-back, midstream", "Sterile (cath) specimen: from the port, not the bag", "24-hr: discard first void, keep on ice"]}, {"name": "Bladder scan / PVR", "color": "teal", "points": ["Post-void residual measured by bladder scan", "High PVR → retention → may need catheterization"]}], "key": "Right technique = valid result.", "priority": "Use sterile technique for catheter specimens; send specimens promptly.", "interventions": ["Label and send or refrigerate", "Bladder scan for suspected retention", "Clean front to back"], "quiz": {"correct": [0, 1, 2, 3], "sata": true, "q": "Which actions are correct when obtaining a clean-catch midstream urine specimen? Select all that apply.", "opts": ["Clean the meatus from front to back", "Begin collecting after the urine stream has started", "Use a sterile specimen container", "Refrigerate or send the specimen promptly", "Collect the very first stream of urine"], "rat": "Clean front to back, collect midstream into a sterile container, and send/refrigerate promptly. The first stream is discarded to reduce contamination — not collected."}}, {"id": "46g", "icon": "🔄", "title": "AKI Phases: Oliguric → Diuretic → Recovery", "teachback": "Know what to watch for in each phase.", "compare": [{"name": "Oliguric", "color": "rose", "points": ["Low output, fluid overload risk", "HYPERkalemia, rising BUN/creatinine"]}, {"name": "Diuretic", "color": "amber", "points": ["Large urine output", "Dehydration + HYPOkalemia risk"]}, {"name": "Recovery", "color": "teal", "points": ["Gradual return of function", "Labs normalize over weeks"]}], "key": "Oliguric = too much fluid/potassium; diuretic = too little fluid/potassium.", "priority": "Oliguric: watch hyperkalemia and overload; diuretic: replace fluids and potassium.", "interventions": ["Strict I&O and daily weights", "Monitor potassium closely in both phases", "Adjust fluids to the phase"], "quiz": {"q": "During the DIURETIC phase of acute kidney injury, the nurse monitors most closely for:", "opts": ["Dehydration and hypokalemia", "Fluid overload and hyperkalemia", "Metabolic alkalosis", "Hypoglycemia"], "correct": [0], "sata": false, "rat": "The diuretic phase produces large urine volumes, risking dehydration and potassium loss. Fluid overload and hyperkalemia are concerns of the earlier oliguric phase."}}, {"id": "46h", "icon": "🩺", "title": "Dialysis Basics & AV Fistula Care", "teachback": "Compare hemodialysis and peritoneal dialysis, and protect the access.", "compare": [{"name": "Hemodialysis", "color": "cobalt", "points": ["Blood filtered by a machine, ~3×/week", "Needs vascular access (AV fistula/graft)", "Watch hypotension & disequilibrium"]}, {"name": "Peritoneal", "color": "purple", "points": ["Dialysate dwells in the peritoneal cavity", "Slower, gentler, can be done at home", "CLOUDY effluent = peritonitis → report"]}, {"name": "AV fistula arm", "color": "rose", "points": ["NO BP, IV, or venipuncture in that arm", "Feel for a thrill, listen for a bruit", "Absent thrill/bruit = clotted → report"]}], "key": "Protect the fistula arm at all costs; cloudy PD return signals peritonitis.", "priority": "Never take a BP or draw blood from the fistula arm; assess thrill and bruit each shift.", "interventions": ["Teach access-arm protection", "Monitor BP closely during hemodialysis", "Report cloudy peritoneal effluent immediately"], "quiz": {"q": "A patient has a new arteriovenous (AV) fistula in the LEFT arm for hemodialysis. Which action is appropriate?", "opts": ["Take blood pressures and draw labs from the right arm only", "Start an IV in the left arm to preserve the right", "Apply a tight, occlusive dressing over the fistula", "Keep the left arm continuously elevated on two pillows"], "correct": [0], "sata": false, "rat": "The fistula arm must be protected — no BP, IV, or venipuncture in it — so use the other arm. Tight dressings or pressure can clot the fistula; patency is checked by feeling a thrill and hearing a bruit."}}]}, "47": {"title": "Ch 47 · Bowel Elimination", "emoji": "🩺", "concepts": [{"id": "47a", "icon": "🧱", "title": "Constipation vs Fecal Impaction", "teachback": "Why might an impacted patient have LIQUID stool? What's the priority during digital removal?", "compare": [{"name": "Constipation", "color": "amber", "points": ["Hard, dry, infrequent stool", "Straining, bloating"]}, {"name": "Impaction", "color": "rose", "points": ["Hardened mass that can't pass", "LIQUID stool leaks AROUND it (paradoxical)", "Rectal fullness, no formed BM"]}], "key": "Liquid stool + no formed BM = think impaction, not diarrhea.", "priority": "During digital removal, STOP immediately if bradycardia/dizziness (vagal response).", "interventions": ["Oil-retention then cleansing enema", "Increase fluids, fiber, activity", "Prevent recurrence with a bowel routine"], "quiz": {"q": "An older adult passes small amounts of liquid stool and reports rectal fullness, with no formed bowel movement for several days. The nurse suspects:", "opts": [" function bodyHTML(c){let h='';

function qsOf(c){return c.quizzes&&c.quizzes.length?c.quizzes:[c.quiz];}

  <div class="qopts" id="qz_${c.id}_${i}">${opts}</div>

 const sb=$(`sub_${cid}_${i}`);if(sb)sb.style.display='none';$('rev_'+cid).style.display='block';
 (ANS[cid]=ANS[cid]||{})[i]=ok;

function abgClass(v,lo,hi){return v<lo?'low':(v>hi?'high':'normal');}
function decodeABG(pH,co2,hco3){
 const acid=pH<7.35,alk=pH>7.45,phNormal=!acid&&!alk;
 const phWord=acid?'acidosis':(alk?'alkalosis':'normal');
 // CO2 = LUNGS = respiratory.  HCO3 = KIDNEYS = metabolic.
 const coState=co2>45?'acidic':(co2<35?'alkalotic':'normal'); // high CO2 = acidic
 const hcState=hco3<22?'acidic':(hco3>26?'alkalotic':'normal'); // low HCO3 = acidic
 let side=phNormal?(pH<7.40?'acidosis':'alkalosis'):(acid?'acidosis':'alkalosis');
 const sideWord=side==='acidosis'?'acidic':'alkalotic';
 // a value is the CAUSE if it is abnormal in the SAME direction as the pH
 const coMatches = coState===sideWord;
 const hcMatches = hcState===sideWord;
 let primary = coMatches?'respiratory':(hcMatches?'metabolic':(coState!=='normal'?'respiratory':(hcState!=='normal'?'metabolic':'none')));
 // build the three explained steps
 const tag=(st)=> st==='normal'?'normal':(st===sideWord?'MATCHES the pH':'opposite of the pH');
 const steps=[
  {k:'1) pH '+pH+' — the verdict',v:acid?'ACIDOSIS (below 7.35)':(alk?'ALKALOSIS (above 7.45)':'normal (7.35–7.45)'),c:acid?'rose':(alk?'cobalt':'teal'),note:'This tells you the body is too '+(side==='acidosis'?'acidic':'alkaline')+'. Now find WHICH system caused it.'},
  {k:'2) PaCO₂ '+co2+' — the LUNGS (respiratory)',v:(co2>45?'HIGH = acidic':co2<35?'LOW = alkalotic':'normal (35–45)')+' → '+tag(coState),c:co2>45?'rose':(co2<35?'cobalt':'teal'),note:'CO₂ is ALWAYS respiratory. High CO₂ = acidic, low CO₂ = alkalotic. It can never make a problem \u2018metabolic.\u2019'},
  {k:'3) HCO₃ '+hco3+' — the KIDNEYS (metabolic)',v:(hco3<22?'LOW = acidic':hco3>26?'HIGH = alkalotic':'normal (22–26)')+' → '+tag(hcState),c:hco3<22?'rose':(hco3>26?'cobalt':'teal'),note:'HCO₃ is ALWAYS metabolic. Low HCO₃ = acidic (e.g. DKA, diarrhea), high HCO₃ = alkalotic.'}
 ];
 const otherState=primary==='respiratory'?hcState:coState;
 const bothAbn=coState!=='normal'&&hcState!=='normal';
 let comp;
 if(primary==='none')comp='';
 else if(phNormal&&bothAbn)comp='Fully compensated';
 else if(!phNormal&&otherState!=='normal')comp='Partially compensated';
 else if(!phNormal)comp='Uncompensated';
 else comp='';
 const mixed=(coState==='acidic'&&hcState==='acidic')||(coState==='alkalotic'&&hcState==='alkalotic');
 let conclusion;
 if(primary==='none')conclusion='All values within normal limits';
 else if(mixed)conclusion='Possible MIXED '+side+' (both CO₂ and HCO₃ are '+sideWord+')';
 else conclusion=(comp?comp+' ':'')+primary+' '+side;
 const why = primary==='none'?'Everything is in range.':
   'The <b>'+(primary==='respiratory'?'CO₂ (respiratory)':'HCO₃ (metabolic)')+'</b> is the value that is abnormal in the SAME direction as the pH \u2014 so it is the <b>cause</b>, making this <b>'+primary+' '+side+'</b>.'+
   (otherState!=='normal'&&!mixed?' The other value moved the opposite way \u2014 that is the body <b>compensating</b>.':'');
 return {steps,primary,comp,conclusion,phNormal,why};
}
function renderABG(r){
 const steps=r.steps.map(x=>`<div class="step ${x.c}"><div><div class="sv">${x.k} → ${x.v}</div><div class="sn">${x.note}</div></div></div>`).join('');
 const compNote=r.comp?`<div class="sn" style="margin-top:6px">Compensation: <b>${r.comp}</b> — `+(r.comp==='Uncompensated'?'the other value is still normal, so the body has not started fixing it yet.':(r.comp==='Fully compensated'?'the pH is back in range, but both values are abnormal.':'the other value shifted the opposite way to push the pH back.'))+`</div>`:'';
 return `<div class="chain">${steps}<div class="step cobalt"><div><div class="sv">4) Which one caused it?</div><div class="sn" style="font-size:.86rem">${r.why}</div>${compNote}</div></div></div><div class="concl">➡️ ${r.conclusion.charAt(0).toUpperCase()+r.conclusion.slice(1)}</div>`;
}
function runABG(){const ph=parseFloat($('abg_ph').value),co2=parseFloat($('abg_co2').value),hco3=parseFloat($('abg_hco3').value);
 if(isNaN(ph)||isNaN(co2)||isNaN(hco3)){$('abg_out').innerHTML='<p class="muted">Enter all three values.</p>';return;}
 $('abg_out').innerHTML=renderABG(decodeABG(ph,co2,hco3));}
function abgPreset(ph,co2,hco3){$('abg_ph').value=ph;$('abg_co2').value=co2;$('abg_hco3').value=hco3;runABG();}
function abgHTML(){return `<div class="card"><div class="cardh"><span class="ic">🫁</span><h3>ABG Decoder — ROME, step by step</h3></div>
 <p class="muted" style="font-size:.9rem">The one rule: <b>CO₂ = lungs (respiratory)</b>, <b>HCO₃ = kidneys (metabolic)</b> — that never changes. Steps: read the <b>pH</b> (acid or alkaline), then find which value is abnormal in the <b>same direction</b> as the pH — <b>that one is the cause</b>. CO₂ matches → respiratory; HCO₃ matches → metabolic. Type values or tap a scenario.</p><p class="muted" style="font-size:.82rem"><b>Heads up on “CO₂”:</b> on a blood gas, <b>PaCO₂</b> is the respiratory value (lungs). On a chem panel (BMP/CMP), <b>“total CO₂” (TCO₂)</b> is really your <b>bicarbonate (HCO₃)</b> — a metabolic value (22–26). Same word, different number — don’t mix them up.</p>
 <div class="abg-row">
  <label>pH<input id="abg_ph" type="number" step="0.01" value="7.30"></label>
  <label>PaCO₂ — the CO₂ (35–45)<input id="abg_co2" type="number" value="58"></label>
  <label>HCO₃ (22–26)<input id="abg_hco3" type="number" value="26"></label>
  <button class="btn small no-print" onclick="runABG()">Decode</button>
 </div>
 <div class="presets no-print">
  <button class="preset" onclick="abgPreset(7.30,58,26)">COPD retention</button>
  <button class="preset" onclick="abgPreset(7.25,26,14)">DKA</button>
  <button class="preset" onclick="abgPreset(7.50,40,32)">Vomiting / NG suction</button>
  <button class="preset" onclick="abgPreset(7.52,28,24)">Anxiety / hyperventilation</button>
  <button class="preset" onclick="abgPreset(7.37,60,34)">Compensated COPD</button>
 </div>
 <div id="abg_out"></div>
 <div class="legend"><span>🟥 acidic</span> <span>🟦 alkalotic</span> <span>🟩 normal</span> <span><b>R</b>espiratory <b>O</b>pposite · <b>M</b>etabolic <b>E</b>qual</span></div>
 <div class="buster"><b>⚠️ “CO₂” trap:</b> On a <b>blood gas (ABG)</b>, <b>PaCO₂</b> is the <b>respiratory</b> value (lungs) — high = acidic, low = alkalotic. On a <b>chem panel (BMP/CMP)</b>, <b>“total CO₂” (TCO₂)</b> is really your <b>bicarbonate (HCO₃)</b> — a <b>metabolic</b> value, normal 22–26. Same word, two different numbers: don’t plug a chem-panel “CO₂” into the PaCO₂ box.</div>
</div>`;}
function render(){
 document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.ch===ch));
 $('mReview').classList.toggle('on',mode==='review');$('mTeach').classList.toggle('on',mode==='teach');
 const teach=mode==='teach';
 $('revealAll').style.display=teach?'':'none';$('resetProg').style.display=teach?'':'none';
 $('intro').textContent=teach
   ?'Answer every question — some concepts have two, including tricky priority and Select All That Apply items. SATA is graded strict (one wrong = whole question wrong). You get the rationale and a visual recap after you submit.'
   :'Study the differences, priorities, and interventions. When you feel solid, switch to Teach-Back and test yourself with exam-style questions.';
 let html=DATA[ch].concepts.map(cardHTML).join('');
 if(mode==='review'&&ch==='42')html=abgHTML()+html;
 $('cards').innerHTML=html;
 if(mode==='review'&&ch==='42')runABG();
 updateCounter();window.scrollTo(0,0);
}
$('mReview').onclick=()=>{mode='review';render();};
$('mTeach').onclick=()=>{mode='teach';render();};
$('revealAll').onclick=()=>DATA[ch].concepts.forEach(c=>revealAnswer(c.id));
$('resetProg').onclick=()=>{DATA[ch].concepts.forEach(c=>KNOWN.delete(c.id));saveKnown();render();};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{ch=t.dataset.ch;render();});
render();
</script>
